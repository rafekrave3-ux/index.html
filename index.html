<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوينت للتحميل الذكي | Point YT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; }
        .glass-effect { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: 0.3s; }
        .btn-gradient:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-white">

    <div class="glass-effect w-full max-w-lg p-8 rounded-[2.5rem] shadow-2xl z-10 relative overflow-hidden">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-red-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg rotate-3">
                <i class="fab fa-youtube text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">بوينت للتحميل الذكي</h1>
            <p class="text-slate-400 mt-2 font-medium">حول فيديوهات يوتيوب إلى MP3 بضغطة زر</p>
        </div>

        <form id="downloadForm" class="space-y-4">
            <input type="text" id="youtubeUrl" placeholder="ضع رابط الفيديو هنا..." 
                class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-4 px-6 focus:outline-none focus:border-blue-500 transition-all text-center dir-ltr" required>
            
            <button type="submit" id="submitBtn" class="w-full btn-gradient text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-3 shadow-xl">
                <span id="btnText">بدء التحويل</span>
                <i id="spinner" class="fas fa-circle-notch fa-spin hidden"></i>
            </button>
        </form>

        <div id="resultSection" class="hidden mt-8 pt-8 border-t border-white/10 text-center animate-pulse">
            <img id="videoThumbnail" class="w-full h-48 object-cover rounded-2xl mb-4 border border-slate-700 shadow-md">
            <h3 id="videoTitle" class="font-bold text-sm mb-5 text-slate-200 px-2">تم تجهيز ملفك بنجاح</h3>
            <a id="downloadButton" class="inline-flex items-center gap-2 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-3 px-10 rounded-xl transition-all active:scale-95">
                <i class="fas fa-download"></i> تحميل الآن
            </a>
        </div>
    </div>

    <footer class="mt-8 text-slate-500 text-xs font-bold tracking-widest uppercase">
        بوينت للدعاية والإعلان &copy; 2026
    </footer>

    <script>
        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('youtubeUrl');
        const resultSection = document.getElementById('resultSection');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const url = urlInput.value.trim();
            const videoId = url.match(/(?:https?:\/\/)?(?:www\.)?youtube\.com\/watch\?v=([^&]+)/)?.[1] || url.split('/').pop();

            if (videoId && videoId.length <= 15) {
                // تفعيل حالة التحميل
                btnText.textContent = 'جاري المعالجة...';
                spinner.classList.remove('hidden');
                submitBtn.disabled = true;

                // محاكاة جلب البيانات وعرض النتيجة
                setTimeout(() => {
                    document.getElementById('videoThumbnail').src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                    
                    // رابط الـ API للتحميل
                    document.getElementById('downloadButton').href = `https://api.vevioz.com/api/button/mp3/${videoId}`;
                    document.getElementById('downloadButton').target = "_blank";

                    resultSection.classList.remove('hidden');
                    btnText.textContent = 'بدء التحويل';
                    spinner.classList.add('hidden');
                    submitBtn.disabled = false;
                }, 1500);
            } else {
                alert('يرجى إدخال رابط يوتيوب صحيح');
            }
        });
    </script>
</body>
</html>
