<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوينت للتحميل الذكي | Point Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            user-select: none; /* حماية: منع تحديد النص */
            -webkit-user-select: none;
            background-color: #000;
        }
        .glass-card {
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(250, 204, 21, 0.25);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gold-btn {
            background: linear-gradient(135deg, #facc15 0%, #a16207 100%);
            transition: all 0.3s ease;
        }
        .gold-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(234, 179, 8, 0.4);
        }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-white relative" oncontextmenu="return false;">

    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-yellow-600/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-yellow-900/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="glass-card p-8 md:p-12 rounded-[3rem] w-full max-w-lg z-10 fade-in border-t-4 border-t-yellow-500">
        
        <div class="text-center mb-10">
            <div class="inline-flex p-5 rounded-[2rem] bg-zinc-900 border border-yellow-500/20 mb-6 shadow-2xl">
                <i class="fab fa-youtube text-5xl text-yellow-500"></i>
            </div>
            <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-l from-yellow-200 via-yellow-500 to-yellow-700 mb-2">
                بوينت للتحميل الذكي
            </h1>
            <p class="text-zinc-500 text-sm font-bold tracking-widest uppercase">The Smartest Way to Download</p>
        </div>

        <form id="downloadForm" class="space-y-4">
            <div class="relative">
                <input type="url" id="ytUrl" required placeholder="ضع رابط الفيديو هنا..."
                    class="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl py-4 px-6 text-white focus:border-yellow-500 transition-all text-left outline-none" dir="ltr">
            </div>

            <button type="submit" id="submitBtn" class="w-full gold-btn text-black font-black py-4 rounded-2xl flex justify-center items-center gap-2">
                <span id="btnText">تحليل الفيديو <i class="fas fa-sync-alt mr-1"></i></span>
                <i id="loadingIcon" class="fas fa-circle-notch fa-spin hidden text-xl"></i>
            </button>
        </form>

        <div id="resultBox" class="hidden mt-10 pt-8 border-t border-zinc-800/50 fade-in">
            <div class="relative group mb-6">
                <img id="thumb" class="w-full h-48 object-cover rounded-2xl border border-zinc-800 shadow-2xl transition-transform group-hover:scale-[1.02]" src="" alt="Thumbnail">
                <div class="absolute inset-0 bg-black/40 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <i class="fas fa-play text-yellow-500 text-3xl"></i>
                </div>
            </div>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="triggerDownload('video')" class="flex items-center justify-center gap-3 w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-zinc-200 transition-all shadow-xl">
                    <i class="fas fa-video text-xl text-yellow-600"></i> تحميل فيديو (MP4)
                </button>

                <button onclick="triggerDownload('mp3')" class="flex items-center justify-center gap-3 w-full bg-zinc-800 text-white font-bold py-4 rounded-2xl hover:bg-zinc-700 transition-all border border-zinc-700">
                    <i class="fas fa-music text-xl text-yellow-500"></i> تحميل صوت (MP3)
                </button>
            </div>
            <p class="text-[10px] text-zinc-600 mt-6 text-center leading-relaxed">عند الضغط، سيتم فتح صفحة التحميل في نافذة جديدة لضمان الخصوصية والأمان.</p>
        </div>
    </div>

    <div class="mt-10 text-zinc-800 text-[10px] font-bold uppercase tracking-[0.5em] z-10">
        Developed by Point Agency &copy; 2026
    </div>

    <script>
        // --- حماية الكود ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                return false;
            }
        };

        let currentVideoId = "";

        // --- منطق المعالجة ---
        document.getElementById('downloadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const url = document.getElementById('ytUrl').value.trim();
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const resultBox = document.getElementById('resultBox');
            const submitBtn = document.getElementById('submitBtn');

            const extractVideoID = (url) => {
                const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[7].length == 11) ? match[7] : false;
            };

            currentVideoId = extractVideoID(url);
            if (!currentVideoId) return alert('الرابط غير مدعوم، يرجى التأكد من الرابط');

            btnText.classList.add('hidden');
            loadingIcon.classList.remove('hidden');
            submitBtn.disabled = true;

            setTimeout(() => {
                document.getElementById('thumb').src = `https://img.youtube.com/vi/${currentVideoId}/mqdefault.jpg`;
                btnText.classList.remove('hidden');
                loadingIcon.classList.add('hidden');
                submitBtn.disabled = false;
                resultBox.classList.remove('hidden');
            }, 800);
        });

        // --- دالة التحميل المصلحة ---
        function triggerDownload(type) {
            let downloadUrl = "";
            if (type === 'video') {
                // استخدام سيرفر مستقر لتحميل الفيديو
                downloadUrl = `https://www.yt2mp3s.me/@api/button/videos/${currentVideoId}`;
            } else {
                // استخدام سيرفر مستقر لتحميل الصوت
                downloadUrl = `https://www.yt2mp3s.me/@api/button/mp3/${currentVideoId}`;
            }
            // فتح الرابط في نافذة جديدة لضمان عدم حدوث تكرار أو إغلاق لموقعك
            window.open(downloadUrl, '_blank');
        }
    </script>
</body>
</html>
