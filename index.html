<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوينت للتحميل الذكي | محول يوتيوب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        
        /* تأثير الزجاج (Glassmorphism) */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden text-white">

    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20"></div>

    <div class="glass-panel p-8 md:p-10 rounded-[2rem] w-full max-w-lg z-10 shadow-2xl">
        
        <div class="text-center mb-8">
            <div class="inline-block p-4 rounded-full bg-slate-800/50 border border-slate-700 mb-4 shadow-lg shadow-red-500/20">
                <i class="fab fa-youtube text-4xl text-red-500"></i>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 mb-2">
                بوينت للتحميل الذكي
            </h1>
            <p class="text-slate-400 text-sm">أداة احترافية لتحويل مقاطع يوتيوب إلى MP3 بضغطة زر</p>
        </div>

        <form id="downloadForm" class="space-y-5">
            <div class="relative">
                <input type="url" id="ytUrl" required placeholder="https://www.youtube.com/watch?v=..."
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl py-4 px-4 pl-12 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-left"
                    dir="ltr">
                <i class="fas fa-link absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-purple-500/25 flex justify-center items-center gap-2 transform hover:scale-[1.02] active:scale-[0.98]">
                <span id="btnText">بدء التحويل <i class="fas fa-bolt mr-1"></i></span>
                <i id="loadingIcon" class="fas fa-circle-notch fa-spin hidden text-xl"></i>
            </button>
        </form>

        <div id="resultBox" class="hidden mt-8 pt-8 border-t border-slate-700/50">
            <img id="thumb" class="w-full h-52 object-cover rounded-2xl mb-5 shadow-lg border border-slate-700" src="" alt="Thumbnail">
            
            <div class="flex items-center justify-center gap-2 mb-5">
                <span class="bg-green-500/10 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/20">
                    <i class="fas fa-check-circle mr-1"></i> جاهز للتحميل
                </span>
                <span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/20">
                    MP3
                </span>
            </div>

            <a id="dlLink" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg">
                <i class="fas fa-cloud-download-alt text-xl text-green-400"></i> تحميل الملف الصوتي
            </a>
        </div>
    </div>

    <div class="mt-8 text-slate-500 text-sm z-10 font-semibold tracking-wide">
        تم التطوير بواسطة بوينت للدعاية والإعلان &copy; 2026
    </div>

    <script>
        document.getElementById('downloadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const url = document.getElementById('ytUrl').value.trim();
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const resultBox = document.getElementById('resultBox');
            const submitBtn = document.getElementById('submitBtn');

            // دالة استخراج ID الفيديو من الرابط بذكاء
            const extractVideoID = (url) => {
                const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[7].length == 11) ? match[7] : false;
            };

            const videoId = extractVideoID(url);

            if (!videoId) {
                alert('عذراً، تأكد من إدخال رابط يوتيوب صحيح.');
                return;
            }

            // تشغيل تأثير التحميل
            btnText.classList.add('hidden');
            loadingIcon.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');
            resultBox.classList.add('hidden');

            // محاكاة سريعة للاتصال بالخادم ثم عرض النتيجة
            setTimeout(() => {
                // جلب أعلى جودة للصورة المصغرة
                document.getElementById('thumb').src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                
                // ربط زر التحميل بـ API جاهز
                document.getElementById('dlLink').href = `https://api.vevioz.com/api/button/mp3/${videoId}`;
                
                // إيقاف تأثير التحميل وإظهار النتيجة
                btnText.classList.remove('hidden');
                loadingIcon.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
                
                resultBox.classList.remove('hidden');
            }, 1200);
        });
    </script>
</body>
</html>
