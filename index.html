<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوينت للتحميل الذكي | Point YT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">بوينت للتحميل الذكي</h1>
        <p class="text-slate-400 mb-8 text-sm">أداة احترافية لتحويل مقاطع يوتيوب إلى MP3</p>

        <form id="downloadForm" class="space-y-4">
            <input type="text" id="youtubeUrl" placeholder="ضع رابط الفيديو هنا..." 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl py-4 px-4 text-center focus:outline-none focus:border-blue-500 transition-all" required>
            
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all flex justify-center items-center gap-2">
                <span id="btnText">بدء التحويل</span>
                <i id="btnSpinner" class="fas fa-circle-notch fa-spin hidden"></i>
            </button>
        </form>

        <div id="resultSection" class="hidden mt-8 pt-8 border-t border-slate-700">
            <img id="videoThumb" class="w-full rounded-xl mb-4 shadow-lg" src="" alt="Thumbnail">
            <h3 id="videoTitle" class="text-sm font-bold mb-6 text-slate-200"></h3>
            <a id="downloadLink" href="#" target="_blank" class="block w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl transition-all">
                <i class="fas fa-download ml-2"></i> تحميل ملف MP3
            </a>
        </div>
    </div>

    <script>
        document.getElementById('downloadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const url = document.getElementById('youtubeUrl').value.trim();
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const resultSection = document.getElementById('resultSection');

            // استخراج معرف الفيديو (Video ID)
            const videoId = url.match(/(?:https?:\/\/)?(?:www\.)?youtube\.com\/watch\?v=([^&]+)/)?.[1] || url.split('/').pop();

            if (videoId) {
                btnText.classList.add('hidden');
                spinner.classList.remove('hidden');

                // محاكاة معالجة بسيطة لعرض النتيجة
                setTimeout(() => {
                    document.getElementById('videoThumb').src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                    document.getElementById('videoTitle').textContent = "تم تجهيز المقطع للتحميل بنجاح";
                    document.getElementById('downloadLink').href = `https://api.vevioz.com/api/button/mp3/${videoId}`;
                    
                    resultSection.classList.remove('hidden');
                    btnText.classList.remove('hidden');
                    spinner.classList.add('hidden');
                }, 1500);
            } else {
                alert('يرجى إدخال رابط يوتيوب صحيح');
            }
        });
    </script>
</body>
</html>
