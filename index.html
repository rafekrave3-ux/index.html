<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوينت للتحميل الذكي | محول يوتيوب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        
        .glass-panel {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(250, 204, 21, 0.2);
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-black min-h-screen flex flex-col items-center justify-center p-4 text-white">

    <div class="absolute top-0 left-0 w-80 h-80 bg-yellow-600/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] w-full max-w-lg z-10 shadow-2xl shadow-yellow-500/5">
        
        <div class="text-center mb-8">
            <div class="inline-block p-4 rounded-3xl bg-zinc-900 border border-yellow-500/30 mb-4">
                <i class="fab fa-youtube text-4xl text-yellow-500"></i>
            </div>
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-yellow-200 to-yellow-600 mb-2">
                بوينت للتحميل الذكي
            </h1>
            <p class="text-zinc-500 text-sm">أداة احترافية وآمنة لتحويل المقاطع</p>
        </div>

        <form id="downloadForm" class="space-y-4">
            <input type="url" id="ytUrl" required placeholder="ضع رابط الفيديو هنا..."
                class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-4 px-5 text-white focus:border-yellow-500 transition-all text-left" dir="ltr">

            <button type="submit" id="submitBtn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-extrabold py-4 rounded-2xl transition-all flex justify-center items-center gap-2">
                <span id="btnText">تحويل الفيديو <i class="fas fa-magic mr-1"></i></span>
                <i id="loadingIcon" class="fas fa-circle-notch fa-spin hidden text-xl"></i>
            </button>
        </form>

        <div id="resultBox" class="hidden mt-8 pt-8 border-t border-zinc-800 fade-in">
            <img id="thumb" class="w-full h-48 object-cover rounded-2xl mb-5 border border-zinc-800" src="" alt="Thumbnail">
            
            <div class="grid grid-cols-1 gap-3">
                <a id="dlLinkMain" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full bg-zinc-100 text-black font-bold py-4 rounded-2xl hover:bg-white transition-all">
                    <i class="fas fa-download text-lg"></i> تحميل MP3 (سيرفر 1)
                </a>
                
                <a id="dlLinkAlt" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full bg-zinc-900 border border-zinc-800 text-zinc-400 font-bold py-3 rounded-2xl hover:border-yellow-500/50 transition-all text-sm">
                    <i class="fas fa-link"></i> سيرفر احتياطي (إذا لم يعمل الأول)
                </a>
            </div>
            <p class="text-center text-[10px] text-zinc-600 mt-4">قد تفتح صفحة التحميل في نافذة جديدة، انتظر ثواني ليبدأ التجهيز.</p>
        </div>
    </div>

    <div class="mt-8 text-zinc-700 text-xs font-bold uppercase tracking-widest">
        Point Advertising &copy; 2026
    </div>

    <script>
        document.getElementById('downloadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const url = document.getElementById('ytUrl').value.trim();
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const resultBox = document.getElementById('resultBox');
            const submitBtn = document.getElementById('submitBtn');

            const extractVideoID = (url) => {
                const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[7].length == 11) ? match[7] : false;
            };

            const videoId = extractVideoID(url);
            if (!videoId) { return alert('يرجى إدخال رابط يوتيوب صحيح'); }

            btnText.classList.add('hidden');
            loadingIcon.classList.remove('hidden');
            submitBtn.disabled = true;

            setTimeout(() => {
                document.getElementById('thumb').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                
                // تحديث الروابط لمزودين جدد مستقرين
                document.getElementById('dlLinkMain').href = `https://www.yt2mp3s.me/@api/button/mp3/${videoId}`;
                document.getElementById('dlLinkAlt').href = `https://youtube-mp360.com/api/button/mp3/${videoId}`;
                
                btnText.classList.remove('hidden');
                loadingIcon.classList.add('hidden');
                submitBtn.disabled = false;
                resultBox.classList.remove('hidden');
            }, 1000);
        });
    </script>
</body>
</html>
